name: Telegram Web E2E

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Test suite to run (bot | autorun | freelancer | settings | all)'
        required: false
        default: 'bot'
      chat_id:
        description: 'Telegram chat id for Cloudflare report callback (optional)'
        required: false
        default: ''
      lang:
        description: 'Report language (ru | en)'
        required: false
        default: 'ru'
      bot_lang:
        description: 'Bot interface language for autorun (ru | en)'
        required: false
        default: 'ru'
      scenario_key:
        description: 'Scenario key for report'
        required: false
        default: 'start_finish'
      report_callback_url:
        description: 'Override Cloudflare report callback URL (optional)'
        required: false
        default: ''
  schedule:
    - cron: "0 5 * * *"

concurrency:
  group: telegram-web-e2e
  cancel-in-progress: false

jobs:
  run-tests:
    name: Run Playwright Bot E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: "true"
      BOT_USERNAME: ${{ vars.BOT_USERNAME }}
      TELEGRAM_WEB_URL: ${{ vars.TELEGRAM_WEB_URL }}
      TELEGRAM_STORAGE_STATE_B64: ${{ secrets.TELEGRAM_STORAGE_STATE_B64 }}
      RUN_CHAT_ID: ${{ inputs.chat_id }}
      RUN_LANG: ${{ inputs.lang }}
      RUN_SCENARIO_KEY: ${{ inputs.scenario_key }}
      RUN_REPORT_CALLBACK_URL: ${{ inputs.report_callback_url }}
      SCREENSHOTS_FILE: .cloudflare-report-screenshots.json
      FAILURE_FILE: .cloudflare-report-failure.json

    steps:
      - name: Mark run start timestamp
        id: started
        shell: bash
        run: |
          echo "epoch=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Install Linux clipboard tools (autorun suite)
        if: ${{ inputs.suite == 'autorun' || inputs.suite == 'all' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y xclip

      - name: Restore Telegram auth storage state
        shell: bash
        run: |
          if [ -z "${TELEGRAM_STORAGE_STATE_B64:-}" ]; then
            echo "::error::Missing secret TELEGRAM_STORAGE_STATE_B64. Generate it from playwright/.auth/user.json and add to repository secrets."
            exit 1
          fi

          mkdir -p playwright/.auth
          printf '%s' "$TELEGRAM_STORAGE_STATE_B64" | base64 --decode > playwright/.auth/user.json

          node -e "JSON.parse(require('fs').readFileSync('playwright/.auth/user.json', 'utf8')); console.log('Auth state restored');"

      - name: Run bot tests
        if: ${{ !inputs.suite || inputs.suite == 'bot' || inputs.suite == 'all' }}
        run: npm run test:bot

      - name: Run strict autorun bot test
        id: autorun
        if: ${{ inputs.suite == 'autorun' || inputs.suite == 'all' }}
        shell: bash
        env:
          E2E_APP_SCREENSHOT_PATH: tests/fixtures/Screenshot_1.png
          E2E_BOT_LANG: ${{ inputs.bot_lang }}
          E2E_FORCE_CLEAN_START: "1"
        run: |
          set +e
          xvfb-run -a npm run test:autorun:text -- --headed 2>&1 | tee autorun-output.log
          status=${PIPESTATUS[0]}
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Run freelancer tests
        if: ${{ inputs.suite == 'freelancer' || inputs.suite == 'all' }}
        run: npm run test:freelancer

      - name: Run settings-flow tests
        if: ${{ inputs.suite == 'settings' || inputs.suite == 'all' }}
        run: npm run test:settings

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 14

      - name: Calculate run duration
        if: always()
        id: duration
        shell: bash
        run: |
          now="$(date +%s)"
          started="${{ steps.started.outputs.epoch }}"
          if [ -z "$started" ]; then
            started="$now"
          fi
          echo "seconds=$((now - started))" >> "$GITHUB_OUTPUT"

      - name: Extract failure reason for Cloudflare report
        if: always()
        env:
          RUN_STATUS: ${{ job.status }}
        run: node scripts/extract_report_failure_reason.mjs autorun-output.log "${FAILURE_FILE}"

      - name: Collect screenshots for Cloudflare report
        if: always()
        run: node scripts/collect_report_screenshots.mjs "${SCREENSHOTS_FILE}"

      - name: Send Cloudflare report callback
        if: ${{ always() && env.RUN_CHAT_ID != '' }}
        env:
          CALLBACK_URL: ${{ env.RUN_REPORT_CALLBACK_URL }}
          CALLBACK_URL_FALLBACK: ${{ vars.CLOUDFLARE_REPORT_URL }}
          CALLBACK_TOKEN: ${{ secrets.CLOUDFLARE_REPORT_TOKEN }}
          CHAT_ID: ${{ env.RUN_CHAT_ID }}
          RUN_LANG: ${{ env.RUN_LANG }}
          RUN_SCENARIO_KEY: ${{ env.RUN_SCENARIO_KEY }}
          RUN_STATUS: ${{ job.status }}
          RUN_DURATION_SEC: ${{ steps.duration.outputs.seconds }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SCREENSHOTS_FILE: ${{ env.SCREENSHOTS_FILE }}
          FAILURE_FILE: ${{ env.FAILURE_FILE }}
        run: node scripts/send_cloudflare_report.mjs
